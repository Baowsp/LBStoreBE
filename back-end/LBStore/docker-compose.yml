version: '3.8'

services:
  mysqldb:
    image: mysql:8.0
    container_name: mysql_container
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: my_web_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../backupdata.sql:/docker-entrypoint-initdb.d/backupdata.sql

  springbootapp:
    build: .
    container_name: springboot_container
    ports:
      - "8080:8080"
    depends_on:
      - mysqldb
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysqldb:3306/my_web_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&zeroDateTimeBehavior=convertToNull
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      # ⚠️ Thay YOUR_SERVER_IP bằng IP hoặc domain thực tế của VPS (vd: http://123.45.67.89:8080 hoặc https://api.yourdomain.com)
      - APP_BASE_URL=http://103.161.171.232:8080
    volumes:
      - uploads_data:/app/uploads

volumes:
  mysql_data:
  uploads_data: